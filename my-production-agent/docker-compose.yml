services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=secret_key_123
      - PORT=8000
    deploy:
      replicas: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - production_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - production_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - production_net

networks:
  production_net:
    driver: bridge
